syntax = "proto3";

package remember_it.api.card;

import "card/messages.proto";

option go_package = "card/pkg/api/card;card";

service CardService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc GetByUserId(GetByUserIdRequest) returns (GetByUserIdResponse);
  rpc Review (ReviewCardRequest) returns (ReviewCardResponse);
}
