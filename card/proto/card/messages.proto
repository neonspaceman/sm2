syntax = "proto3";

import "google/protobuf/timestamp.proto";

package remember_it.api.card;

option go_package = "card/pkg/api/card;card";

enum FileType {
  NONE = 0;
  PHOTO = 1;
  DOCUMENT = 2;
}

enum Rating {
  AGAIN = 0;
  HARD = 1;
  GOOD = 2;
  EASY = 3;
}

message Card {
  string id = 1;
  string question = 2;
  string answer = 3;
  FileType file_type = 4;
  string file_id = 5;
}

message ReviewLog {
  string id = 1;
  string card_id = 2;
  Rating rating = 3;
}

message CreateRequest {
  string user_id = 1;
  string question = 2;
  string answer = 3;
  FileType file_type = 4;
  string file_id = 5;
}

message CreateResponse {
  Card card = 1;
}

message GetByUserIdRequest {
  string user_id = 1;
  uint64 limit = 2;
  string after = 3;
}

message GetByUserIdResponse {
  repeated Card cards = 1;
  string end_cursor = 2;
  bool has_next = 3;
}

message ReviewCardRequest {
  string user_id = 1;
  string card_id = 2;
  google.protobuf.Timestamp review_at = 3;
  Rating rating = 4;
}

message ReviewCardResponse {
  ReviewLog review_log = 1;
}
